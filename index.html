<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 助手</title>
    <style>
      body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
      .input-area { display: flex; gap: 8px; margin-bottom: 12px; }
      #msg { flex: 1; padding: 8px; font-size: 14px; }
      #send { padding: 8px 16px; cursor: pointer; background: #4f46e5; color: white; border: none; border-radius: 4px; }
      .image-area { margin-bottom: 12px; }
      #preview { max-width: 200px; max-height: 200px; display: none; margin-top: 8px; border-radius: 4px; }
      #reply-content { white-space: pre-wrap; line-height: 1.6; }
      .loading { color: #999; }
    </style>
  </head>
  <body>
    <div class="input-area">
      <input type="text" id="msg" placeholder="输入消息，或贴上图片URL让AI识别..." />
      <button id="send">发送</button>
    </div>
    <div class="image-area">
      <label>上传图片：<input type="file" id="imageUpload" accept="image/*" /></label>
      <br />
      <img id="preview" />
    </div>
    <p>回复：</p>
    <div id="reply-content"></div>

    <script>
      const replyContent = document.getElementById("reply-content");
      const send = document.getElementById("send");
      const msg = document.getElementById("msg");
      const imageUpload = document.getElementById("imageUpload");
      const preview = document.getElementById("preview");

      let imageBase64 = null;

      imageUpload.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          imageBase64 = event.target.result;
          preview.src = imageBase64;
          preview.style.display = "block";
        };
        reader.readAsDataURL(file);
      });

      send.addEventListener("click", async () => {
        const text = msg.value.trim();
        if (!text && !imageBase64) return;

        replyContent.textContent = "";
        replyContent.classList.add("loading");
        replyContent.textContent = imageBase64 ? "识图中..." : "思考中...";

        try {
          const body = { msg: text, image: imageBase64 || undefined };
          const response = await fetch("http://localhost:3000", {
            method: "POST",
            body: JSON.stringify(body),
            headers: { "Content-Type": "application/json" },
          });
          const data = await response.json();
          replyContent.classList.remove("loading");
          replyContent.textContent = data.reply;
        } catch (err) {
          replyContent.classList.remove("loading");
          replyContent.textContent = "请求失败: " + err.message;
        }

        imageBase64 = null;
        imageUpload.value = "";
        preview.style.display = "none";
      });
    </script>
  </body>
</html>
